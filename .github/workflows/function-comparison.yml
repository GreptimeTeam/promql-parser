name: Function Comparison

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  compare:
    name: Compare Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run function comparison
        run: python scripts/compare_functions.py
